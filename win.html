<!DOCTYPE html>
<html>
<head>
<title>WIN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
max-width:500px;
margin:auto;
}

h1{
color:#ff6600;
}

button{
background:#ff6600;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

input{
margin:10px;
}

#result{
margin-top:20px;
text-align:left;
background:#f9f9f9;
padding:15px;
border-radius:10px;
}
</style>

</head>

<body>

<div class="box">

<h1>🏏 WIN</h1>

<p>Upload Match Info Screenshot</p>

<input type="file" accept="image/*" onchange="previewImage(event)">
<br><br>
<img id="preview" width="100%" style="display:none;border-radius:10px;">

<br><br>

<button onclick="research()">
🔍 Research Match
</button>

<div id="result"></div>

</div>

<script>
function previewImage(event){

var reader = new FileReader();

reader.onload = function(){

var output = document.getElementById('preview');

output.src = reader.result;

output.style.display = "block";

}

reader.readAsDataURL(event.target.files[0]);

  }
function research(){

document.getElementById("result").innerHTML = `

<h3>🤖 AI Pre-Match Research</h3>

✅ Weather + Dew<br><br>

✅ Venue Stats<br><br>

✅ Recent Form<br><br>

✅ Head-to-Head (H2H)<br><br>

✅ Team News / Injury Update<br><br>

✅ Historical Pitch Behaviour<br><br>

✅ Player Statistics<br><br>

✅ Team Strength Analysis<br><br>

<hr>

<h3>📸 Please Upload</h3>

1️⃣ Toss Result Screenshot<br><br>

2️⃣ Confirmed Playing XI Screenshot<br><br>

3️⃣ Final Pitch Report Screenshot<br><br>

4️⃣ Live Odds Screenshot

`;

}

</script>

</body>
</html>
