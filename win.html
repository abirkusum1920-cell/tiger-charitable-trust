<!DOCTYPE html>
<html>
<head>
<title>WIN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
max-width:500px;
margin:auto;
}

h1{
color:#ff6600;
}

button{
background:#ff6600;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

input{
margin:10px;
}

#result{
margin-top:20px;
text-align:left;
background:#f9f9f9;
padding:15px;
border-radius:10px;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>

<div class="box">

<h1>🏏 WIN</h1>

<p>Upload Match Info Screenshot</p>

<input type="file" accept="image/*" onchange="previewImage(event)">
<br><br>
<img id="preview" width="100%" style="display:none;border-radius:10px;">

<br><br>

<button onclick="research()">
🔍 Research Match
</button>


<div id="forceBox" style="display:none; margin-top:15px;">
  <button onclick="forceValidate()"
    style="
      background:#28a745;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:10px;
      font-size:16px;
      width:100%;
      cursor:pointer;">

      ✅ Continue Anyway (User Responsibility)
  </button>
</div>

<div id="ocrText"></div>
<div id="result"></div>
  

</div>

<script>
function previewImage(event){

var reader = new FileReader();

reader.onload = function(){

var output = document.getElementById('preview');

output.src = reader.result;

output.style.display = "block";

}

reader.readAsDataURL(event.target.files[0]);

  }
function research(){
const file = document.querySelector('input[type="file"]').files[0];

if (!file) {
    alert("❌ প্রথমে Screenshot Upload করুন");
    return;
}

document.getElementById("ocrText").innerHTML =
"⏳ Image যাচাই করা হচ্ছে...";
Tesseract.recognize(
    file,
    'eng'
).then(({ data: { text } }) => {

    // document.getElementById("ocrText").innerHTML =
// "<h3>📄 OCR Text</h3><pre>" + text + "</pre>";

    let lowerText = text.toLowerCase();
// Team vs Team চেক
// Team vs Team চেক
let hasTeams = (
    lowerText.includes(" vs ") ||
    lowerText.includes(" v ") ||
    lowerText.includes("vs ") ||
    lowerText.includes(" vs") ||
    lowerText.includes("ind") ||
    lowerText.includes("india") ||
    lowerText.includes("aus") ||
    lowerText.includes("australia") ||
    lowerText.includes("eng") ||
    lowerText.includes("england") ||
    lowerText.includes("pak") ||
    lowerText.includes("pakistan") ||
    lowerText.includes("sa") ||
    lowerText.includes("south africa") ||
    lowerText.includes("nz") ||
    lowerText.includes("new zealand") ||
    lowerText.includes("ban") ||
    lowerText.includes("bangladesh") ||
    lowerText.includes("sl") ||
    lowerText.includes("sri lanka") ||
    lowerText.includes("wi") ||
    lowerText.includes("west indies")
);

// League চেক
let hasLeague = (
    lowerText.includes("league") ||
    lowerText.includes("premier") ||
    lowerText.includes("cup") ||
    lowerText.includes("t20") ||
    lowerText.includes("odi") ||
    lowerText.includes("test")
);

// তারিখ চেক
let hasDate = /\b\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}\b/.test(lowerText);

// সময় চেক
let hasTime = (
    lowerText.includes("am") ||
    lowerText.includes("pm") ||
    /\b\d{1,2}:\d{2}\b/.test(lowerText)
);

// ভেন্যু/মাঠ চেক
let hasVenue = (
    lowerText.includes("stadium") ||
    lowerText.includes("ground") ||
    lowerText.includes("venue") ||
    lowerText.includes("park") ||
    lowerText.includes("oval") ||
    lowerText.includes("arena")
);

// কয়টি শর্ত পূরণ হয়েছে গণনা
let score = 0;

if (hasTeams) score++;
if (hasLeague) score++;
if (hasDate) score++;
if (hasTime) score++;
if (hasVenue) score++;

// ৫টির মধ্যে সব ৫টি না থাকলে Invalid
if (score < 5) {

document.getElementById("ocrText").innerHTML =
"❌ Invalid Cricket Screenshot!";

document.getElementById("result").innerHTML =
"❌ Invalid Cricket Screenshot!";

document.getElementById("forceBox").style.display = "block";

return;
}
    

let cricketKeywords = [
  "vs",
  "innings",
  "over",
  "score",
  "wicket",
  "toss",
  "crr",
  "rrr",
  "batting",
  "bowling",
  "run",
  "team"
];

let found = cricketKeywords.some(word =>
    lowerText.includes(word)
);

if (!found) {
    document.getElementById("result").innerHTML =
    "❌ Invalid Cricket Screenshot!";

    return;
}
document.getElementById("ocrText").innerHTML =
"✅ Cricket Screenshot Detected";
    document.getElementById("result").innerHTML = `
    <h3>🤖 AI Pre-Match Research</h3>

    ✅ Weather + Dew<br><br>
    ✅ Venue Stats<br><br>
    ✅ Recent Form<br><br>
    ✅ Head-to-Head (H2H)<br><br>
    ✅ Team News / Injury Update<br><br>
    ✅ Historical Pitch Behaviour<br><br>
    ✅ Player Statistics<br><br>
    ✅ Team Strength Analysis<br><br>

    <hr>

    <hr>

<h3>📸 Please Upload</h3>

<h4>1️⃣ Toss Result Screenshot</h4>
<input type="file" id="tossFile" accept="image/*">

<h4>2️⃣ Confirmed Playing XI Screenshot</h4>
<input type="file" id="xiFile" accept="image/*">

<h4>3️⃣ Final Pitch Report Screenshot</h4>
<input type="file" id="pitchFile" accept="image/*">

<h4>4️⃣ Live Odds Screenshot</h4>
<input type="file" id="oddsFile" accept="image/*">

<br><br>

<button onclick="analyzeExtraScreenshots()">
🤖 Analyze All Screenshots
</button>
    `;
});

}
function forceValidate(){

    document.getElementById("forceBox").style.display = "none";

    document.getElementById("ocrText").innerHTML =
    "✅ User Approved Screenshot";

    document.getElementById("result").innerHTML = `
<h3>⚠ User Approved Screenshot</h3>

<p>AI Validation failed, but user chose to continue.</p>

<hr>

<h3>🤖 AI Pre-Match Research</h3>

✅ Weather + Dew<br><br>
✅ Venue Stats<br><br>
✅ Recent Form<br><br>
✅ Head-to-Head (H2H)<br><br>
✅ Team News / Injury Update<br><br>
✅ Historical Pitch Behaviour<br><br>
✅ Player Statistics<br><br>
✅ Team Strength Analysis<br><br>

<hr>

<h3>📸 Please Upload</h3>

<h4>1️⃣ Toss Result Screenshot</h4>
<input type="file" id="tossFile" accept="image/*">

<h4>2️⃣ Confirmed Playing XI Screenshot</h4>
<input type="file" id="xiFile" accept="image/*">

<h4>3️⃣ Final Pitch Report Screenshot</h4>
<input type="file" id="pitchFile" accept="image/*">

<h4>4️⃣ Live Odds Screenshot</h4>
<input type="file" id="oddsFile" accept="image/*">

<br><br>

<button onclick="analyzeExtraScreenshots()">
🤖 Analyze All Screenshots
</button>
`;
}
function analyzeExtraScreenshots(){

    const toss = document.getElementById("tossFile").files[0];
    const xi = document.getElementById("xiFile").files[0];
    const pitch = document.getElementById("pitchFile").files[0];
    const odds = document.getElementById("oddsFile").files[0];

    if(!toss || !xi || !pitch || !odds){
        alert("❌ Please upload all 4 screenshots");
        return;
    }

    document.getElementById("result").innerHTML =
"⏳ Reading screenshots... Please wait...";
}
</script>

</body>
</html>
