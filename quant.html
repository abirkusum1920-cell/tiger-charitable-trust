<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NEURAL-QUANT ANALYZER</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
width:100%;
padding:15px;
background:#28a745;
color:white;
border:none;
border-radius:10px;
font-size:18px;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<h2>🏏 NEURAL-QUANT ANALYZER</h2>
<input type="text" id="match" placeholder="Match Name (IND vs AUS)">

<input type="text" id="league" placeholder="League Name">

<input type="text" id="teamA" placeholder="Team A Name">

<input type="text" id="teamB" placeholder="Team B Name">
<h3>Team A Strength (0-10)</h3>

<input type="number" id="batA" placeholder="Batting">
<input type="number" id="bowlA" placeholder="Bowling">
<input type="number" id="allA" placeholder="All-Rounder">
<input type="number" id="expA" placeholder="Experience">
<input type="number" id="winnerA" placeholder="Match Winner">
<h3>Team B Strength (0-10)</h3>

<input type="number" id="batB" placeholder="Batting">
<input type="number" id="bowlB" placeholder="Bowling">
<input type="number" id="allB" placeholder="All-Rounder">
<input type="number" id="expB" placeholder="Experience">
<input type="number" id="winnerB" placeholder="Match Winner">
    <select id="toss">
<option value="">Toss Winner</option>
<option>Team A</option>
<option>Team B</option>
</select>

<select id="pitch">
<option value="">Pitch Type</option>
<option>Batting Friendly</option>
<option>Bowling Friendly</option>
<option>Spin Friendly</option>
</select>

<select id="dew">
<option value="">Dew Level</option>
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
<input type="number" id="opp" placeholder="Opportunity Score">

<input type="number" id="risk" placeholder="Risk Score">

<input type="number" id="trust" placeholder="Trust Score">
<input type="number" id="oddsA" placeholder="Market Odds Team A (e.g. 1.80)">

<input type="number" id="oddsB" placeholder="Market Odds Team B (e.g. 2.20)">
<button onclick="analyze()">ANALYZE</button>

<div id="result"></div>
</div>

<script>
function analyze() {
    if (document.getElementById("toss").value === "") {
    alert("Please select Toss Winner");
    return;
}

    let batA = Number(document.getElementById("batA").value);
    let bowlA = Number(document.getElementById("bowlA").value);
    let allA = Number(document.getElementById("allA").value);
let expA = Number(document.getElementById("expA").value);
let winnerA = Number(document.getElementById("winnerA").value);
    let batB = Number(document.getElementById("batB").value);
    let bowlB = Number(document.getElementById("bowlB").value);
    let allB = Number(document.getElementById("allB").value);
let expB = Number(document.getElementById("expB").value);
let winnerB = Number(document.getElementById("winnerB").value);
    let opp = Number(document.getElementById("opp").value);
    let risk = Number(document.getElementById("risk").value);
    let trust = Number(document.getElementById("trust").value);
let oddsA = Number(document.getElementById("oddsA").value);
let oddsB = Number(document.getElementById("oddsB").value);
    let scoreA = batA + bowlA + allA + expA + winnerA;
let scoreB = batB + bowlB + allB + expB + winnerB;
if(document.getElementById("toss").value === "Team A"){
    scoreA += 2;
}
else if(document.getElementById("toss").value === "Team B"){
    scoreB += 2;
}
   if(document.getElementById("pitch").value === "Batting Friendly"){
    scoreA += batA * 0.2;
    scoreB += batB * 0.2;
}

if(document.getElementById("pitch").value === "Bowling Friendly"){
    scoreA += bowlA * 0.2;
    scoreB += bowlB * 0.2;
}

if(document.getElementById("pitch").value === "Spin Friendly"){
    scoreA += allA * 0.1;
    scoreB += allB * 0.1;
}
   if(document.getElementById("dew").value === "High"){

    if(document.getElementById("toss").value === "Team A"){
        scoreA += 1.5;
    }

    else if(document.getElementById("toss").value === "Team B"){
        scoreB += 1.5;
    }

   } 
    let result = "";
let total = scoreA + scoreB;

let probA = ((scoreA / total) * 100).toFixed(1);
let probB = ((scoreB / total) * 100).toFixed(1);
   let confidence = Math.abs(probA - probB).toFixed(1);
   let marketProbA = (1 / oddsA) * 100;
let marketProbB = (1 / oddsB) * 100;

let valueEdgeA = (probA - marketProbA).toFixed(1);
let valueEdgeB = (probB - marketProbB).toFixed(1);
    if (opp >= 70 && risk <= 30 && trust >= 70 && confidence >= 10) {

    if (scoreA > scoreB) {
        result = "✅ BET ON TEAM A";
    } else if (scoreB > scoreA) {
        result = "✅ BET ON TEAM B";
    } else {
        result = "⚠️ NO BET (Teams Equal)";
    }

} else if (confidence < 10) {

    result = "👀 WATCHLIST";

} else {

    result = "❌ NO BET";

    }

    document.getElementById("result").innerHTML =
"<h3>" + result + "</h3>" +
"<p>Team A Score: " + scoreA.toFixed(1) + "</p>" +
"<p>Team B Score: " + scoreB.toFixed(1) + "</p>" +
"<p>Team A Win Probability: " + probA + "%</p>" +
"<p>Team B Win Probability: " + probB + "%</p>" +
"<p>Confidence Score: " + confidence + "%</p>" +
"<p>Team A Value Edge: " + valueEdgeA + "%</p>" +
"<p>Team B Value Edge: " + valueEdgeB + "%</p>";
}
</script>

</body>
</html>
