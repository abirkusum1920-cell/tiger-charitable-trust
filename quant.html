<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NEURAL-QUANT ANALYZER</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
width:100%;
padding:15px;
background:#28a745;
color:white;
border:none;
border-radius:10px;
font-size:18px;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<h2>🏏 NEURAL-QUANT ANALYZER</h2>

<input type="number" id="opp" placeholder="Opportunity Score">

<input type="number" id="risk" placeholder="Risk Score">

<input type="number" id="trust" placeholder="Trust Score">

<button onclick="analyze()">ANALYZE</button>

<div id="result"></div>
</div>

<script>
function analyze(){

let opp=parseInt(document.getElementById("opp").value);
let risk=parseInt(document.getElementById("risk").value);
let trust=parseInt(document.getElementById("trust").value);

let decision="";

if(opp>=75 && risk<35 && trust>=75){
decision="✅ BET";
}
else if(opp<65 || risk>60 || trust<60){
decision="❌ NO BET";
}
else{
decision="👀 WATCHLIST";
}

document.getElementById("result").innerHTML=
"Recommendation: " + decision;
}
</script>

</body>
</html>
